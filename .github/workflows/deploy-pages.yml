name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Scheduled data refreshes deploy from update-data.yml after collection succeeds.
    # This guard skips only commits explicitly marked as already deployed by update-data.yml.
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, 'Skip-Pages-Deploy: update-data-workflow') == false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static site
        run: |
          rm -rf site
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
